name: Release standalone binary
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev,build]'
      - name: Run checks
        run: |
          python -m compileall -q src tests packaging
          python -m pytest -q
          ruff check .
      - name: Build wheel
        run: python -m build --wheel
      - name: Build standalone executable
        run: |
          pyinstaller --noconfirm --clean packaging/freeplane-tmux.spec
          chmod +x dist/freeplane-tmux-linux-x86_64
      - name: Smoke-test executable
        run: |
          dist/freeplane-tmux-linux-x86_64 --help
          tmpdir="$(mktemp -d)"
          dist/freeplane-tmux-linux-x86_64 \
            --map-json examples/example-map.json \
            --output-dir "$tmpdir"
          test -s "$tmpdir/demo.map.json"
          test -s "$tmpdir/demo.tmuxp.yaml"
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freeplane-tmux-linux-x86_64
          path: |
            dist/freeplane-tmux-linux-x86_64
            dist/*.whl
          if-no-files-found: error
      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/freeplane-tmux-linux-x86_64 \
              dist/*.whl \
              --clobber
          else
            gh release create "$TAG" \
              dist/freeplane-tmux-linux-x86_64 \
              dist/*.whl \
              --verify-tag \
              --generate-notes \
              --title "$TAG"
          fi
