session_name: tmux
windows:
- window_name: mcmp2
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - export ENV_VARIABLE=1abcmgmt.mansion.example.org
    - printf '\033]2;%s\033\\' remote
    - 'ssh -tt -A seed.mgmt.mansion.example.org ''tmp=$(mktemp)

      trap ''"''"''rm -f "$tmp"''"''"'' EXIT

      cat >"$tmp" <<''"''"''FREEPLANE_TMUX_RC''"''"''

      export ENV_VARIABLE=1abcmgmt.mansion.example.org

      FREEPLANE_TMUX_RC

      bash --noprofile --rcfile "$tmp" -i'''
    - 'ssh -tt mcmp2.mgmt.mansion.example.org ''tmp=$(mktemp)

      trap ''"''"''rm -f "$tmp"''"''"'' EXIT

      cat >"$tmp" <<''"''"''FREEPLANE_TMUX_RC''"''"''

      export ENV_VARIABLE=1abcmgmt.mansion.example.org

      FREEPLANE_TMUX_RC

      bash --noprofile --rcfile "$tmp" -i'''
    - node_status
    - ping
    - ping node_status.mgmt.mansion.example.org
    - uptime
    environment:
      ENV_VARIABLE: 1abcmgmt.mansion.example.org
