session_name: playground
windows:
- window_name: mcmp2
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' pane1
    - ssh hw0076
    - ping mcmp2.mgmt.example.invalid
  - shell_command:
    - printf '\033]2;%s\033\\' pane2
    - ssh mcmp2
- window_name: mcmp3
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' pane1
    - ssh hw0076
    - ping mcmp3.mgmt.example.invalid
  - shell_command:
    - printf '\033]2;%s\033\\' pane2
    - ssh mcmp3
  - shell_command:
    - printf '\033]2;%s\033\\' 'additional pane'
    - echo additional pane
