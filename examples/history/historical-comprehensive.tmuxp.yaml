session_name: tmux sesion-name
windows:
- window_name: example1
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - export ENV_TEST=abc
    - export ENV_TEST2=bca
    - printf '\033]2;%s\033\\' bar
    - 'ssh -tt -A seed.mgmt.mansion.shitcluster.io ''tmp=$(mktemp)

      trap ''"''"''rm -f "$tmp"''"''"'' EXIT

      cat >"$tmp" <<''"''"''FREEPLANE_TMUX_RC''"''"''

      export ENV_TEST=abc

      export ENV_TEST2=bca

      FREEPLANE_TMUX_RC

      bash --noprofile --rcfile "$tmp" -i'''
    - echo hello
    - echo world
    environment:
      ENV_TEST: abc
      ENV_TEST2: bca
