session_name: r/tmux
windows:
- window_name: hello-win
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' 'second pane'
    - uptime
    - hostname
    - echo test
  - shell_command:
    - printf '\033]2;%s\033\\' 'remote host'
    - ssh hw0076
    - uptime
    - hostname
    - pwd
    - uptime
- window_name: mcmp2
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' ping
    - ssh hw0076
    - ping mcmp2.mgmt.mansion.shitcluster.io
  - shell_command:
    - printf '\033]2;%s\033\\' mcmp2
    - ssh mcmp2
    - hostname
- window_name: mcmp3
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' ping
    - ssh hw0076
    - ping mcmp3.mgmt.mansion.shitcluster.io
  - shell_command:
    - printf '\033]2;%s\033\\' mcmp3
    - ssh mcmp3
    - hostname
