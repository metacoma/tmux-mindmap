session_name: tmux
windows:
- window_name: посложнее
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - bash
  - shell_command:
    - printf '\033]2;%s\033\\' remote
    - ssh remote host
    - echo 1
    - echo 2
    - echo 3
  - shell_command:
    - bash
