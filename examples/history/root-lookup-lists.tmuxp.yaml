session_name: kubernetes cluster
windows:
- window_name: test-node-ips
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' 'show all ips'
    - for i in 10.20.0.3 10.20.0.4 10.20.0.5 10.20.0.6; do echo "$i"; done
- window_name: test-detail-ips
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' 'show all ips'
    - for i in 8.8.8.8 1.1.1.1 4.4.4.4; do echo "$i"; done
- window_name: test-hierarchical-ips
  layout: main-horizontal
  options:
    pane-border-status: top
    pane-border-format: '#{pane_index}: #{pane_title}'
  panes:
  - shell_command:
    - printf '\033]2;%s\033\\' 'show all nested ips'
    - for i in 10.20.0.3 10.20.0.4 10.20.0.5 10.20.0.6; do echo "$i"; done
